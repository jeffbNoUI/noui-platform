# Cross-language verification fixtures for benefit formula.
# Both Go (math/big.Rat) and Python (decimal.Decimal) must produce
# identical results on every case — $0.00 variance.
#
# Plan config tiers (from domains/pension/plan-config.yaml):
#   TIER_1: multiplier=0.020, reduction=lookup_table, NRA=65, floor=$800
#   TIER_2: multiplier=0.015, reduction=lookup_table, NRA=65, floor=$800
#   TIER_3: multiplier=0.015, reduction=lookup_table (different table), NRA=65, floor=$800

test_cases:
  - name: tier1_normal_retirement_65
    inputs:
      yos: "25.0000"
      fas: "5500.00"
      age_at_retirement: 65
      tier_code: "TIER_1"
    expected:
      gross_monthly: "229.17"
      reduction_factor: "1.00"
      final_monthly: "800.00"

  - name: tier1_early_retirement_58
    inputs:
      yos: "25.0000"
      fas: "5500.00"
      age_at_retirement: 58
      tier_code: "TIER_1"
    expected:
      gross_monthly: "229.17"
      reduction_factor: "0.79"
      final_monthly: "800.00"

  - name: tier1_high_earner_normal
    inputs:
      yos: "30.0000"
      fas: "25000.00"
      age_at_retirement: 65
      tier_code: "TIER_1"
    expected:
      gross_monthly: "1250.00"
      reduction_factor: "1.00"
      final_monthly: "1250.00"

  - name: tier1_high_earner_early_58
    inputs:
      yos: "30.0000"
      fas: "25000.00"
      age_at_retirement: 58
      tier_code: "TIER_1"
    expected:
      gross_monthly: "1250.00"
      reduction_factor: "0.79"
      final_monthly: "987.50"

  - name: tier2_normal_retirement_floor
    inputs:
      yos: "25.0000"
      fas: "5500.00"
      age_at_retirement: 65
      tier_code: "TIER_2"
    expected:
      gross_monthly: "171.88"
      reduction_factor: "1.00"
      final_monthly: "800.00"

  - name: tier3_early_retirement_63
    inputs:
      yos: "30.0000"
      fas: "25000.00"
      age_at_retirement: 63
      tier_code: "TIER_3"
    expected:
      gross_monthly: "937.50"
      reduction_factor: "0.88"
      final_monthly: "825.00"

  - name: unknown_tier_error
    inputs:
      yos: "25.0000"
      fas: "5500.00"
      age_at_retirement: 65
      tier_code: "UNKNOWN"
    expected:
      error: true
