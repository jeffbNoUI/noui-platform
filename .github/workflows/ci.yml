name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  connector:
    name: Connector (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: connector/go.mod
      - name: Build
        working-directory: connector
        run: go build ./...
      - name: Vet
        working-directory: connector
        run: go vet ./...
      - name: Test
        working-directory: connector
        run: go test ./... -v -count=1 -short

  platform-services:
    name: Platform - ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [apiresponse, dataaccess, intelligence, crm, correspondence, dataquality, knowledgebase, casemanagement, issues, preferences, security, employer-shared, employer-portal, employer-reporting, employer-enrollment, employer-terminations, employer-waret, employer-scp]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: platform/${{ matrix.service }}/go.mod
      - name: Build
        working-directory: platform/${{ matrix.service }}
        run: go build ./...
      - name: Vet
        working-directory: platform/${{ matrix.service }}
        run: go vet ./...
      - name: Test
        working-directory: platform/${{ matrix.service }}
        run: go test ./... -v -count=1 -short

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Lint
        working-directory: frontend
        run: npm run lint
      - name: Build
        working-directory: frontend
        run: npm run build
      - name: Test
        working-directory: frontend
        run: npm test -- --run

  docker-validate:
    name: Docker Compose Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose file
        run: docker compose config > /dev/null

  e2e:
    name: E2E Integration Tests
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Start Docker Compose stack
        run: docker compose up -d --build

      - name: Wait for health aggregation
        run: |
          echo "Waiting for healthagg to become ready..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8091/healthz > /dev/null 2>&1; then
              echo "healthagg ready after $((i * 5))s"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "FATAL: healthagg not ready after 300s"
              docker compose logs healthagg 2>&1 | tail -30
              exit 1
            fi
            sleep 5
          done
          echo "Waiting 10s for all services to stabilize..."
          sleep 10

      - name: Run Services Hub E2E tests
        run: bash tests/e2e/services_hub_e2e.sh

      - name: Run Correspondence E2E tests
        run: bash tests/e2e/correspondence_e2e.sh

      - name: Run Negative Path E2E tests
        run: bash tests/e2e/negative_paths_e2e.sh

      - name: Run Workflow E2E tests
        run: bash tests/e2e/workflows_e2e.sh

      - name: Collect logs on failure
        if: failure()
        run: |
          echo "=== Docker Compose Service Logs ==="
          docker compose logs --tail=50 2>&1
          echo "=== Docker Compose PS ==="
          docker compose ps

      - name: Tear down stack
        if: always()
        run: docker compose down --remove-orphans
