name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  connector:
    name: Connector (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: connector/go.mod
      - name: Build
        working-directory: connector
        run: go build ./...
      - name: Vet
        working-directory: connector
        run: go vet ./...
      - name: Test
        working-directory: connector
        run: go test ./... -v -count=1 -short

  platform-services:
    name: Platform - ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [dataaccess, intelligence, crm, correspondence, dataquality, knowledgebase]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: platform/${{ matrix.service }}/go.mod
      - name: Build
        working-directory: platform/${{ matrix.service }}
        run: go build ./...
      - name: Vet
        working-directory: platform/${{ matrix.service }}
        run: go vet ./...
      - name: Test
        working-directory: platform/${{ matrix.service }}
        run: go test ./... -v -count=1 -short

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Lint
        working-directory: frontend
        run: npm run lint
      - name: Build
        working-directory: frontend
        run: npm run build
      - name: Test
        working-directory: frontend
        run: npm test -- --run

  docker-validate:
    name: Docker Compose Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose file
        run: docker compose config > /dev/null
