run:
  timeout: 3m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosimple
    - gocritic
    - misspell
    - gofmt

linters-settings:
  gocritic:
    enabled-checks:
      - appendAssign
      - dupCase
      - dupSubExpr
      - nilValReturn
      - underef
  misspell:
    locale: US
  errcheck:
    check-blank: false

issues:
  max-issues-per-linter: 50
  max-same-issues: 5
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gocritic
