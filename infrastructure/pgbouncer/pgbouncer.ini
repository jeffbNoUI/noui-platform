[databases]
noui = host=postgres port=5432 dbname=noui

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = plain
auth_file = /etc/pgbouncer/userlist.txt

; Transaction pooling — services use BEGIN + set_config(..., true) per request
pool_mode = transaction

; Connection limits — 16+ services connect at startup
max_client_conn = 300
default_pool_size = 30
min_pool_size = 5
reserve_pool_size = 10
reserve_pool_timeout = 5

; Timeouts
server_connect_timeout = 10
server_idle_timeout = 300
server_lifetime = 3600
client_idle_timeout = 600
query_timeout = 30
query_wait_timeout = 30

; Logging
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
stats_period = 60

; Admin
admin_users = noui
