[databases]
derp = host=postgres port=5432 dbname=derp

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = plain
auth_file = /etc/pgbouncer/userlist.txt

; Transaction pooling — compatible with set_config(..., false) RLS pattern
pool_mode = transaction

; Connection limits
max_client_conn = 200
default_pool_size = 20
min_pool_size = 5
reserve_pool_size = 5
reserve_pool_timeout = 3

; Timeouts
server_connect_timeout = 5
server_idle_timeout = 300
server_lifetime = 3600
client_idle_timeout = 600
query_timeout = 30
query_wait_timeout = 10

; Logging
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
stats_period = 60

; Admin
admin_users = derp
