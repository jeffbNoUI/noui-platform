      - ./domains/pension/schema/026_dq_suppression.sql:/docker-entrypoint-initdb.d/047_dq_suppression.sql
      - ./domains/pension/schema/027_issues_schema.sql:/docker-entrypoint-initdb.d/048_issues_schema.sql
      - ./domains/pension/seed/006_dq_suppression_seed.sql:/docker-entrypoint-initdb.d/049_dq_suppression_seed.sql
      - ./domains/pension/seed/016_issues_seed.sql:/docker-entrypoint-initdb.d/050_issues_seed.sql
