    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U noui"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgbouncer:
    image: edoburu/pgbouncer:latest
    volumes:
      - ./infrastructure/pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./infrastructure/pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432 -U noui"]
      interval: 5s
      timeout: 3s
      retries: 5

  prism-source:
    image: postgres:16
    environment:
      POSTGRES_DB: prism_prod
      POSTGRES_USER: prism
      POSTGRES_PASSWORD: prism
    volumes:
      - ./migration-simulation/sources/prism/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prism -d prism_prod"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - default

  pas-source:
    image: postgres:16
    environment:
      POSTGRES_DB: pas_prod
      POSTGRES_USER: pas
      POSTGRES_PASSWORD: pas
    volumes:
      - ./migration-simulation/sources/pas/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pas -d pas_prod"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - default

  dataaccess:
    build:
      context: ./platform
      dockerfile: dataaccess/Dockerfile
    environment:
      PORT: "8081"
      DB_HOST: pgbouncer
      DB_PORT: "6432"
      DB_USER: noui
      DB_PASSWORD: noui
      DB_NAME: noui
      DB_SSLMODE: disable
      DB_MAX_OPEN_CONNS: "8"
      DB_MAX_IDLE_CONNS: "3"
      CORS_ORIGIN: "http://localhost:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      pgbouncer:
        condition: service_healthy

  intelligence:
    build:
      context: ./platform
      dockerfile: intelligence/Dockerfile
    volumes:
      - ./domains/pension/plan-config.yaml:/data/plan-config.yaml:ro
    environment:
      PORT: "8082"
      CONNECTOR_URL: "http://dataaccess:8081"
      CORS_ORIGIN: "http://localhost:3000"
      DB_HOST: pgbouncer
      DB_PORT: "6432"
      DB_USER: noui
      DB_PASSWORD: noui
      DB_NAME: noui
      DB_SSLMODE: disable
      DB_MAX_OPEN_CONNS: "3"
      DB_MAX_IDLE_CONNS: "1"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      pgbouncer:
        condition: service_healthy
      dataaccess:
        condition: service_started

