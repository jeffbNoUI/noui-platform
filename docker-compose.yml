      - ./platform/migration/db/migrations/037_reconciliation_results.sql:/docker-entrypoint-initdb.d/042_reconciliation_results.sql
      - ./platform/migration/db/migrations/038_source_plan_code.sql:/docker-entrypoint-initdb.d/043_source_plan_code.sql
      - ./platform/migration/db/migrations/039_reconciliation_patterns.sql:/docker-entrypoint-initdb.d/044_reconciliation_patterns.sql
      - ./platform/migration/db/migrations/040_certification_record.sql:/docker-entrypoint-initdb.d/045_certification_record.sql
