services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: derp
      POSTGRES_USER: derp
      POSTGRES_PASSWORD: derp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./domains/pension/schema/001_legacy_schema.sql:/docker-entrypoint-initdb.d/001_legacy_schema.sql
      - ./domains/pension/schema/002_crm_schema.sql:/docker-entrypoint-initdb.d/002_crm_schema.sql
      - ./domains/pension/seed/002_legacy_seed.sql:/docker-entrypoint-initdb.d/003_legacy_seed.sql
      - ./domains/pension/seed/003_crm_seed.sql:/docker-entrypoint-initdb.d/004_crm_seed.sql
      - ./domains/pension/schema/003_knowledgebase_schema.sql:/docker-entrypoint-initdb.d/005_knowledgebase_schema.sql
      - ./domains/pension/schema/004_dataquality_schema.sql:/docker-entrypoint-initdb.d/006_dataquality_schema.sql
      - ./domains/pension/schema/005_correspondence_schema.sql:/docker-entrypoint-initdb.d/007_correspondence_schema.sql
      - ./domains/pension/seed/004_knowledgebase_seed.sql:/docker-entrypoint-initdb.d/008_knowledgebase_seed.sql
      - ./domains/pension/seed/005_dataquality_seed.sql:/docker-entrypoint-initdb.d/009_dataquality_seed.sql
      - ./domains/pension/seed/006_correspondence_seed.sql:/docker-entrypoint-initdb.d/010_correspondence_seed.sql
      - ./domains/pension/schema/006_casemanagement_schema.sql:/docker-entrypoint-initdb.d/011_casemanagement_schema.sql
      - ./domains/pension/schema/007_add_dro_id_to_case.sql:/docker-entrypoint-initdb.d/012_add_dro_id_to_case.sql
      - ./domains/pension/seed/007_casemanagement_seed.sql:/docker-entrypoint-initdb.d/013_casemanagement_seed.sql
      - ./domains/pension/seed/008_additional_seed.sql:/docker-entrypoint-initdb.d/014_additional_seed.sql
      - ./domains/pension/schema/008_correspondence_enrich.sql:/docker-entrypoint-initdb.d/015_correspondence_enrich.sql
      - ./domains/pension/seed/009_correspondence_enrich_seed.sql:/docker-entrypoint-initdb.d/016_correspondence_enrich_seed.sql
      - ./domains/pension/schema/009_correspondence_caseid_text.sql:/docker-entrypoint-initdb.d/017_correspondence_caseid_text.sql
      - ./domains/pension/seed/010_correspondence_caseid_seed.sql:/docker-entrypoint-initdb.d/018_correspondence_caseid_seed.sql
      - ./domains/pension/schema/010_summary_log.sql:/docker-entrypoint-initdb.d/019_summary_log.sql
      - ./domains/pension/schema/011_case_enrichment.sql:/docker-entrypoint-initdb.d/020_case_enrichment.sql
      - ./domains/pension/seed/011_case_enrichment_seed.sql:/docker-entrypoint-initdb.d/021_case_enrichment_seed.sql
      - ./domains/pension/schema/012_member_search_index.sql:/docker-entrypoint-initdb.d/022_member_search_index.sql
      - ./domains/pension/seed/013_expanded_members.sql:/docker-entrypoint-initdb.d/023_expanded_members.sql
      - ./domains/pension/seed/014_expanded_cases.sql:/docker-entrypoint-initdb.d/024_expanded_cases.sql
      - ./domains/pension/seed/015_expanded_crm.sql:/docker-entrypoint-initdb.d/025_expanded_crm.sql
      - ./domains/pension/schema/013_row_level_security.sql:/docker-entrypoint-initdb.d/026_row_level_security.sql
      - ./domains/pension/schema/014_performance_indexes.sql:/docker-entrypoint-initdb.d/027_performance_indexes.sql
      - ./domains/pension/schema/015_preferences_schema.sql:/docker-entrypoint-initdb.d/028_preferences_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U derp"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgbouncer:
    image: edoburu/pgbouncer:1.22.0
    ports:
      - "6432:6432"
    volumes:
      - ./infrastructure/pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./infrastructure/pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432 -U derp"]
      interval: 5s
      timeout: 3s
      retries: 5

  dataaccess:
    build:
      context: ./platform/dataaccess
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      PORT: "8081"
      DB_HOST: pgbouncer
      DB_PORT: "6432"
      DB_USER: derp
      DB_PASSWORD: derp
      DB_NAME: derp
      DB_SSLMODE: disable
      DB_MAX_OPEN_CONNS: "8"
      DB_MAX_IDLE_CONNS: "3"
      CORS_ORIGIN: "http://localhost:3000"
    depends_on:
      pgbouncer:
        condition: service_healthy

  intelligence:
    build:
      context: ./platform/intelligence
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    environment:
      PORT: "8082"
      CONNECTOR_URL: "http://dataaccess:8081"
      CORS_ORIGIN: "http://localhost:3000"
      DB_HOST: pgbouncer
      DB_PORT: "6432"
      DB_USER: derp
      DB_PASSWORD: derp
      DB_NAME: derp
      DB_SSLMODE: disable
      DB_MAX_OPEN_CONNS: "3"
      DB_MAX_IDLE_CONNS: "1"
    depends_on:
      pgbouncer:
        condition: service_healthy
      dataaccess:
        condition: service_started

  crm:
    build:
      context: ./platform/crm
      dockerfile: Dockerfile
    ports:
      - "8084:8083"
    environment:
      PORT: "8083"
      DB_HOST: pgbouncer
      DB_PORT: "6432"
      DB_USER: derp
      DB_PASSWORD: derp
      DB_NAME: derp
      DB_SSLMODE: disable
      DB_MAX_OPEN_CONNS: "8"
      DB_MAX_IDLE_CONNS: "3"
      CORS_ORIGIN: "http://localhost:3000"
    depends_on:
      pgbouncer:
        condition: service_healthy

  knowledgebase:
    build:
      context: ./platform/knowledgebase
      dockerfile: Dockerfile
    ports:
      - "8087:8087"
    environment:
      PORT: "8087"
      DB_HOST: pgbouncer
      DB_PORT: "6432"
      DB_USER: derp
      DB_PASSWORD: derp
      DB_NAME: derp
      DB_SSLMODE: disable
      DB_MAX_OPEN_CONNS: "5"
      DB_MAX_IDLE_CONNS: "2"
      CORS_ORIGIN: "http://localhost:3000"
    depends_on:
      pgbouncer:
        condition: service_healthy

  dataquality:
    build:
      context: ./platform/dataquality
      dockerfile: Dockerfile
    ports:
      - "8086:8086"
    environment:
      PORT: "8086"
      DB_HOST: pgbouncer
      DB_PORT: "6432"
      DB_USER: derp
      DB_PASSWORD: derp
      DB_NAME: derp
      DB_SSLMODE: disable
      DB_MAX_OPEN_CONNS: "5"
      DB_MAX_IDLE_CONNS: "2"
      CORS_ORIGIN: "http://localhost:3000"
    depends_on:
      pgbouncer:
        condition: service_healthy

  correspondence:
    build:
      context: ./platform/correspondence
      dockerfile: Dockerfile
    ports:
      - "8085:8085"
    environment:
      PORT: "8085"
      DB_HOST: pgbouncer
      DB_PORT: "6432"
      DB_USER: derp
      DB_PASSWORD: derp
      DB_NAME: derp
      DB_SSLMODE: disable
      DB_MAX_OPEN_CONNS: "5"
      DB_MAX_IDLE_CONNS: "2"
      CORS_ORIGIN: "http://localhost:3000"
    depends_on:
      pgbouncer:
        condition: service_healthy

  casemanagement:
    build:
      context: ./platform/casemanagement
      dockerfile: Dockerfile
    ports:
      - "8088:8088"
    environment:
      PORT: "8088"
      DB_HOST: pgbouncer
      DB_PORT: "6432"
      DB_USER: derp
      DB_PASSWORD: derp
      DB_NAME: derp
      DB_SSLMODE: disable
      DB_MAX_OPEN_CONNS: "8"
      DB_MAX_IDLE_CONNS: "3"
      CORS_ORIGIN: "http://localhost:3000"
    depends_on:
      pgbouncer:
        condition: service_healthy

  preferences:
    build:
      context: ./platform/preferences
      dockerfile: Dockerfile
    ports:
      - "8089:8089"
    environment:
      PORT: "8089"
      DB_HOST: pgbouncer
      DB_PORT: "6432"
      DB_USER: derp
      DB_PASSWORD: derp
      DB_NAME: derp
      DB_SSLMODE: disable
      DB_MAX_OPEN_CONNS: "5"
      DB_MAX_IDLE_CONNS: "2"
      CORS_ORIGIN: "http://localhost:3000"
    depends_on:
      pgbouncer:
        condition: service_healthy

  connector:
    build:
      context: ./connector
      dockerfile: Dockerfile
    ports:
      - "8090:8090"
    environment:
      PORT: "8090"
      CORS_ORIGIN: "http://localhost:3000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - dataaccess
      - intelligence
      - crm
      - casemanagement
      - knowledgebase
      - dataquality
      - correspondence

volumes:
  pgdata:
