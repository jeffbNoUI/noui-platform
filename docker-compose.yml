      - ./domains/pension/schema/025_employer_scp.sql:/docker-entrypoint-initdb.d/034_employer_scp.sql
      - ./db/migrations/030_migration_schema.sql:/docker-entrypoint-initdb.d/035_migration_schema.sql
      - ./platform/migration/db/migrations/031_migration_risk_event.sql:/docker-entrypoint-initdb.d/036_migration_risk_event.sql
