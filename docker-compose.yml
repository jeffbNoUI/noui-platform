        condition: service_healthy
      migration-intelligence:
        condition: service_healthy

  migration-intelligence:
    build:
      context: ./migration-intelligence
    environment:
      PORT: "8101"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8101/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 3

