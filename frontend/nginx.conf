server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy timeouts — aligned with Go WriteTimeout (30s) + small buffer
    proxy_connect_timeout 5s;
    proxy_send_timeout    10s;
    proxy_read_timeout    35s;

    # SPA routing: serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to backend services
    location /api/v1/members {
        proxy_pass http://dataaccess:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/eligibility {
        proxy_pass http://intelligence:8082;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/benefit {
        proxy_pass http://intelligence:8082;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/dro {
        proxy_pass http://intelligence:8082;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/summary-log {
        proxy_pass http://intelligence:8082;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/crm {
        proxy_pass http://crm:8083;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Tenant-ID $http_x_tenant_id;
    }

    location /api/v1/kb {
        proxy_pass http://knowledgebase:8087;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Tenant-ID $http_x_tenant_id;
    }

    location /api/v1/dq {
        proxy_pass http://dataquality:8086;
        proxy_set_header Host $host;
