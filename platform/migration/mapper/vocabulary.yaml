# vocabulary.yaml — Pension terminology crosswalk for mapper enrichment
#
# Source: 25-system pension glossary analysis (PERA, CalPERS, TMRS, OPERS,
#         TRS, NYSLRS, SERS, MassPRIM, etc.)
#
# Structure:
#   Top-level keys are concept tags matching registry template ConceptTag values.
#   Second-level keys are slot names matching TemplateSlot.CanonicalColumn values.
#   terms: list of lowercase underscore-separated expected column names
#   false_cognates: list of {term, warning, risk} for D2 warning system
#
# Embedded into Go binary via //go:embed. Merged with registry ExpectedNames
# at startup — duplicates are deduplicated automatically.

service-credit:
  credited_years_total:
    terms:
      - service_credit
      - credited_service
      - creditable_service
      - membership_service
      - retirement_credit
      - allowable_service
      - qualifying_service_credit
      - contributing_months
      - earned_service_credit
      - equivalent_membership_service_credit
      - eligibility_points
      - sc
      - cs
      - qsc
      - ep
    false_cognates:
      - term: membership_service
        warning: "In some systems refers to membership status period, not credited service time"
        risk: HIGH
      - term: allowable_service
        warning: "May refer to service categories eligible for purchase rather than credited time"
        risk: MEDIUM
      - term: service_credit
        warning: "In TMRS, refers to a monetary account balance, not time-based service units"
        risk: HIGH

  purchased_years:
    terms:
      - purchased_service
      - purchasing_service_credit
      - purchase_of_service_credit
      - purchase_service_credit
      - psc
      - buy_back
      - buyback
      - buy_back_service_credit
      - redeposit_of_withdrawn_contributions
      - refund_buyback
      - reinstated_service
      - restored_withdrawn_credit
      - service_prior_to_membership
      - spm
      - optional_service_credit
      - qualified_employment
      - nonqualified_employment
      - prior_governmental_service
      - nongovernmental_service
      - one_for_five_service
      - permissive_service_credit
      - full_cost_purchase
      - prior_service_credit
      - restricted_prior_service_credit
      - rpsc
      - prior_service
      - additional_retirement_credit
      - arc
      - additional_retirement_service_credit
      - arsc
      - non_qualifying_part_time
      - nqpt
      - multiple_service
      - combined_service
      - joint_service_credit
    false_cognates:
      - term: prior_service
        warning: "Ambiguous — may refer to credited service before a plan change, not purchased service"
        risk: MEDIUM
      - term: prior_service_credit
        warning: "In TMRS, refers to a monetary credit (updated service credits), not purchased time"
        risk: HIGH

  military_service_years:
    terms:
      - military_service_credit
      - military_leave_of_absence
      - us_military_leave
      - userra_service_credit
      - userra
      - granted_military_service
      - free_military_service_credit
      - prior_active_military_service
      - wartime_service

  transferred_service:
    terms:
      - reciprocity
      - transferred_service
      - transfer
      - combined_service_annuity
      - csa
      - reciprocal_service
      - joint_service_credit
      - proportionate_retirement_program
      - prp
      - service_transfers

  service_type:
    terms:
      - service_category
      - leave_type
      - benefit_protection_leave
      - salary_continuance
      - workers_compensation_credit
      - lwop
      - leave_without_pay

