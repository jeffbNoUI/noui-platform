# --- Non-registry concepts (stored for D2/D3 enrichment) ---

fac-abbreviations:
  salary_average:
    terms:
      - has
      - ams
      - fac
      - fas
      - afc
      - fre
      - amc
      - hac
      - final_average_salary
      - final_average_compensation
      - average_final_compensation
      - final_compensation
      - final_rate_of_earnings
      - highest_average_salary
      - average_monthly_salary
      - average_monthly_compensation
      - highest_average_compensation
      - high_five_average_salary
    false_cognates:
      - term: afc
        warning: "Average Final Compensation vs. Annual Fire Compensation in some municipal systems"
        risk: HIGH
      - term: fas
        warning: "Final Average Salary vs. Financial Accounting Standards in non-pension contexts"
        risk: MEDIUM
      - term: updated_service_credits
        warning: "In TMRS, this is a monetary account value, not a salary average"
        risk: HIGH

